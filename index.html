<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Dotted Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: sans-serif;
        }
        #loading {
            position: absolute;
            font-size: 1.2rem;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="loading">LOADING...</div>

    <!-- Using Vite module resolution instead of importmaps to run locally -->

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';
        import mapImageSrc from './assets/gemini_generated_image_9pu1ow9pu1ow9pu1.png';

        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();

        // Optional: Background stars have been removed for a pure black background

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 240;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 2. Setup Orbit Controls for interactivity
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;
        controls.minDistance = 120;
        controls.maxDistance = 400;
        controls.target.set(0, 0, 0); // Ensure globe rotates around true center

        // GUI Parameters State
        const params = {
            rotationSpeed: 0.001,
            rotationDirection: -1, // -1 = Right, 1 = Left
            mapThreshold: 128,
            dotSize: 1.5,
            dotColor: '#ffffff',
            bgColor: '#000000'
        };

        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // Variables needed globally for the GUI and re-rendering
        let pointsMesh;
        let imgDataObject = null;
        let mapImageObj = null;

        // Helper function to create a circular soft dot texture
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(32, 32, 28, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }

        // Function to generate the globe dots based on current threshold and image data
        function generateGlobeDots() {
            if (!imgDataObject || !mapImageObj) return;

            // Remove previous points if they exist (for live updates via GUI)
            if (pointsMesh) {
                globeGroup.remove(pointsMesh);
                pointsMesh.geometry.dispose();
                pointsMesh.material.dispose();
            }

            const vertices = [];
            const radius = 100;
            const rows = 240;

            for (let lat = -90; lat <= 90; lat += 180 / rows) {
                const r2 = Math.cos(lat * Math.PI / 180) * radius;
                const circumference = 2 * Math.PI * r2;

                const pointsInRow = Math.max(1, Math.floor(circumference / (Math.PI * radius / rows)));

                for (let i = 0; i < pointsInRow; i++) {
                    const lon = (i / pointsInRow) * 360 - 180;

                    const u = 1 - ((lon + 180) / 360);
                    const v = 1 - (lat + 90) / 180;

                    let x = Math.floor(u * mapImageObj.width);
                    let y = Math.floor(v * mapImageObj.height);
                    if (x >= mapImageObj.width) x = mapImageObj.width - 1;
                    if (y >= mapImageObj.height) y = mapImageObj.height - 1;

                    const index = (y * mapImageObj.width + x) * 4;
                    const brightness = imgDataObject[index];

                    if (brightness < params.mapThreshold) {
                        const phi = (90 - lat) * Math.PI / 180;
                        const theta = (lon + 180) * Math.PI / 180;

                        const px = radius * Math.sin(phi) * Math.cos(theta);
                        const py = radius * Math.cos(phi);
                        const pz = radius * Math.sin(phi) * Math.sin(theta);

                        vertices.push(px, py, pz);
                    }
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

            const material = new THREE.PointsMaterial({
                color: params.dotColor,
                size: params.dotSize,
                map: createCircleTexture(),
                transparent: true,
                opacity: 0.8, // Fixed dot opacity
                alphaTest: 0.1,
                depthWrite: false, // Prevents depth-buffer occlusion bugs for transparent points
                sizeAttenuation: true
            });

            pointsMesh = new THREE.Points(geometry, material);
            globeGroup.add(pointsMesh);
        }

        // 3. Load High-Resolution Earth Water Mask
        const img = new Image();
        // Resolve the local asset path so Vite includes it in the 'build' folder
        img.src = mapImageSrc;

        img.onload = () => {
            document.getElementById('loading').style.opacity = '0';
            mapImageObj = img;

            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0);
            imgDataObject = ctx.getImageData(0, 0, img.width, img.height).data;

            // Generate initial dots
            generateGlobeDots();

            globeGroup.rotation.z = 0;
        };

        // --- BUILD GUI PANEL ---
        const gui = new GUI({ title: 'Globe Settings' });

        gui.add(params, 'rotationSpeed', 0, 0.01).name('Rotation Speed');
        gui.add(params, 'rotationDirection', { 'Right': -1, 'Left': 1 }).name('Rotation Direction');

        gui.add(params, 'mapThreshold', 0, 255, 1).name('Map Threshold').onChange(() => {
            // Re-generate dots when threshold is completely tweaked
            generateGlobeDots();
        });

        gui.addColor(params, 'dotColor').name('Dots Color').onChange((val) => {
            if (pointsMesh && pointsMesh.material) {
                pointsMesh.material.color.set(val);
            }
        });

        gui.add(params, 'dotSize', 0.1, 5.0, 0.1).name('Dots Size').onChange((val) => {
            if (pointsMesh && pointsMesh.material) {
                pointsMesh.material.size = val;
            }
        });

        gui.addColor(params, 'bgColor').name('Background Color').onChange((val) => {
            document.body.style.backgroundColor = val; // Update HTML body
            // Background is technically set by CSS, but renderer respects the body color if alpha is true
        });

        // Set initial body background to match default params
        document.body.style.backgroundColor = params.bgColor;

        img.onerror = () => {
            document.getElementById('loading').innerText = "ERROR LOADING TEXTURE";
        };

        // ---------- GLOBE ROTATION SPEED ----------
        // Change this value to make the globe spin faster or slower.
        // Positive values spin right, negative values spin left.
        const rotationSpeed = 0.001;
        // ------------------------------------------

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 5. Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Rotate the entire globe group
            globeGroup.rotation.y += params.rotationSpeed * params.rotationDirection;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
