<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Dotted Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: sans-serif;
        }
        #loading {
            position: absolute;
            font-size: 1.2rem;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="loading">LOADING...</div>

    <!-- Import maps polyfill for older browsers -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();

        // Optional: Background stars have been removed for a pure black background

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 240;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 2. Setup Orbit Controls for interactivity
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;
        controls.minDistance = 120;
        controls.maxDistance = 400;
        controls.target.set(0, 0, 0); // Ensure globe rotates around true center

        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // Helper function to create a circular soft dot texture
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(32, 32, 28, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }

        // 3. Load Earth Specular Map Image
        const img = new Image();
        img.crossOrigin = "Anonymous";
        // The three.js specular map: oceans are bright (white), land is dark (black)
        img.src = "https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg";

        img.onload = () => {
            document.getElementById('loading').style.opacity = '0';

            // Draw image to a background canvas to read pixel data
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0);
            const imgData = ctx.getImageData(0, 0, img.width, img.height).data;

            const vertices = [];
            const radius = 100;
            const rows = 120; // Controls the density of horizontal bands (the dotted look)

            // 4. Generate points in a structured spherical grid layout
            for (let lat = -90; lat <= 90; lat += 180 / rows) {
                const r2 = Math.cos(lat * Math.PI / 180) * radius;
                const circumference = 2 * Math.PI * r2;

                // Keep horizontal spacing identical to vertical spacing
                const pointsInRow = Math.max(1, Math.floor(circumference / (Math.PI * radius / rows)));

                for (let i = 0; i < pointsInRow; i++) {
                    const lon = (i / pointsInRow) * 360 - 180; // from -180 to 180

                    // Map lat/lon to image UV coordinates (0 to 1)
                    const u = (lon + 180) / 360;
                    const v = 1 - (lat + 90) / 180;

                    // Map to image pixels
                    let x = Math.floor(u * img.width);
                    let y = Math.floor(v * img.height);
                    if (x >= img.width) x = img.width - 1;
                    if (y >= img.height) y = img.height - 1;

                    const index = (y * img.width + x) * 4;
                    const brightness = imgData[index]; // using Red channel as brightness

                    // Specular Map: dark pixels (<60) are land, bright pixels are ocean
                    if (brightness < 60) {
                        const phi = (90 - lat) * Math.PI / 180;
                        const theta = (lon + 180) * Math.PI / 180;

                        // Convert spherical coordinates to Cartesian coordinates
                        const px = radius * Math.sin(phi) * Math.cos(theta);
                        const py = radius * Math.cos(phi);
                        const pz = radius * Math.sin(phi) * Math.sin(theta);

                        // Add positions without jitter for a perfectly round globe
                        vertices.push(
                            px,
                            py,
                            pz
                        );
                    }
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 2.5,
                map: createCircleTexture(),
                transparent: true,
                opacity: 0.9,
                alphaTest: 0.1,
                sizeAttenuation: true
            });

            const points = new THREE.Points(geometry, material);

            // Remove Earth's axial tilt to keep the globe straight
            globeGroup.rotation.z = 0;
            globeGroup.add(points);
        };

        img.onerror = () => {
            document.getElementById('loading').innerText = "ERROR LOADING TEXTURE";
        };

        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 5. Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Rotate the globe on its own slightly tilted Y axis
            if (globeGroup.children.length > 0) {
                const pointsMesh = globeGroup.children[0];
                // Rotate locally around Y axis
                pointsMesh.rotation.y -= 0.0005;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
